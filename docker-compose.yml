services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: calchub
      POSTGRES_PASSWORD: calchub123
      POSTGRES_DB: calchub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calchub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://calchub:calchub123@db:5432/calchub
      SECRET_KEY: dev-secret-key-change-me
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy

  pwa:
    build:
      context: .
      dockerfile: pwa/Dockerfile
    ports:
      - "5173:5173"
    environment:
      API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
