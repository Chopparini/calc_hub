<!DOCTYPE html>
<html lang="pl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CalcHub - Logowanie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;font-family:system-ui,sans-serif;color:#e8e6f0;min-height:100vh}
.nav{background:#16213e;border-bottom:0.5px solid #2d2d4e;padding:0 24px;height:52px;display:flex;align-items:center}
.logo{font-size:18px;font-weight:500;color:#a78bfa}
.content{display:flex;flex-direction:column;align-items:center;padding:32px 24px}
.tabs{display:flex;gap:4px;background:#16213e;border-radius:10px;padding:4px;width:100%;max-width:380px;margin-bottom:24px}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;color:#9994b8;border-radius:7px;cursor:pointer}
.tab.active{background:#7c3aed;color:#fff;font-weight:500}
.card{background:#16213e;border:0.5px solid #2d2d4e;border-radius:12px;padding:24px;width:100%;max-width:380px;margin-bottom:20px}
.card-title{font-size:18px;font-weight:500;margin-bottom:6px}
.card-sub{font-size:13px;color:#9994b8;margin-bottom:24px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-group label{font-size:12px;color:#9994b8}
.form-group input{width:100%;background:#0f0f23;border:0.5px solid #2d2d4e;color:#e8e6f0;padding:9px 14px;border-radius:8px;font-size:13px}
.hint{font-size:11px;color:#9994b8;margin-top:3px}
.forgot{font-size:12px;color:#9994b8;text-align:right;margin-top:-8px;margin-bottom:14px}
.forgot a{color:#a78bfa;cursor:pointer}
.btn-primary{width:100%;background:#7c3aed;border:none;color:#fff;padding:11px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px}
.switch{text-align:center;font-size:13px;color:#9994b8;margin-top:16px}
.switch a{color:#a78bfa;cursor:pointer}
.error{background:#2d1515;border:0.5px solid #7f1d1d;border-radius:8px;padding:10px 12px;font-size:13px;color:#f87171;margin-bottom:14px}
</style>
</head>
<body>
<nav class="nav"><span class="logo">CalcHub</span></nav>
<div class="content">
  <div class="tabs">
    <div class="tab active">Zaloguj się</div>
    <div class="tab">Zarejestruj się</div>
  </div>
  <div class="card">
    <div class="card-title">Witaj z powrotem</div>
    <div class="card-sub">Zaloguj się do swojego konta</div>
    <div class="error">Nieprawidłowy login lub hasło</div>
    <div class="form-group"><label>Login lub e-mail</label><input type="text" placeholder="twoj_login"/></div>
    <div class="form-group"><label>Hasło</label><input type="password" placeholder="••••••••••••"/></div>
    <div class="forgot"><a>Nie pamiętam hasła - napisz do nas</a></div>
    <button class="btn-primary">Zaloguj się</button>
    <div class="switch">Nie masz konta? <a>Zarejestruj się</a></div>
  </div>
  <div class="card">
    <div class="card-title">Utwórz konto</div>
    <div class="card-sub">Zapisuj i porównuj swoje kalkulacje</div>
    <div class="form-group"><label>Login</label><input type="text" placeholder="tylko litery i cyfry"/></div>
    <div class="form-group"><label>E-mail</label><input type="email" placeholder="ty@example.com"/></div>
    <div class="form-group"><label>Hasło</label><input type="password" placeholder="••••••••••••"/><div class="hint">Minimum 12 znaków, maksimum 50</div></div>
    <div class="form-group"><label>Powtórz hasło</label><input type="password" placeholder="••••••••••••"/></div>
    <button class="btn-primary">Zarejestruj się</button>
    <div class="switch">Masz już konto? <a>Zaloguj się</a></div>
  </div>
</div>
</body></html>
